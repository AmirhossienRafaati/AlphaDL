name: Delete Job
run-name: MattDownloader delete ${{ inputs.job_id }}

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job id to delete
        required: true

permissions:
  contents: write

# Keep one writer at a time so delete jobs do not fight download jobs during git push.
concurrency:
  group: download-${{ github.repository }}
  cancel-in-progress: false

jobs:
  delete:
    runs-on: ubuntu-latest
    env:
      JOB_ID: ${{ inputs.job_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$JOB_ID" =~ ^[A-Za-z0-9_-]{6,64}$ ]]; then
            echo "Invalid job_id: $JOB_ID" >&2
            exit 1
          fi

      - name: Delete job folder
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "jobs/$JOB_ID"

      - name: Commit delete
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          mkdir -p jobs
          git add -A jobs

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Delete MattDownloader job $JOB_ID"
            git push
          fi
