name: Purge Job
run-name: MattDownloader purge ${{ inputs.job_id }}

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job id to delete
        required: true

permissions:
  contents: write

# Keep one writer at a time so purge jobs do not fight download jobs during git push.
concurrency:
  group: download-${{ github.repository }}
  cancel-in-progress: false

jobs:
  purge:
    runs-on: ubuntu-latest
    env:
      JOB_ID: ${{ inputs.job_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$JOB_ID" =~ ^[A-Za-z0-9_-]{6,64}$ ]]; then
            echo "Invalid job_id: $JOB_ID" >&2
            exit 1
          fi

      - name: Purge job folder from Git history
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          python3 -m pip install --user git-filter-repo
          export PATH="$HOME/.local/bin:$PATH"

          BRANCH="${GITHUB_REF_NAME:-main}"
          AUTH_REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global pack.threads 1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # git-filter-repo rewrites history and may remove origin as a safety
          # measure, so restore a fresh token-backed remote before pushing.
          git filter-repo --force --path "jobs/$JOB_ID" --invert-paths

          git remote remove origin >/dev/null 2>&1 || true
          git remote add origin "$AUTH_REMOTE"

          git gc --prune=now

          LOCAL_SHA="$(git rev-parse HEAD)"
          for attempt in 1 2 3; do
            echo "Force pushing purged history, attempt $attempt..."
            if git push origin "+HEAD:$BRANCH"; then
              echo "Purge pushed successfully."
              exit 0
            fi

            REMOTE_SHA="$(git ls-remote origin "refs/heads/$BRANCH" | awk '{print $1}' || true)"
            if [ "$REMOTE_SHA" = "$LOCAL_SHA" ]; then
              echo "Remote branch already points at the purged commit."
              exit 0
            fi

            sleep $((attempt * 15))
          done

          echo "Could not push purged history after retries." >&2
          exit 1
