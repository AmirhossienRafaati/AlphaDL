name: Purge Job
run-name: MattDownloader purge ${{ inputs.job_id }}

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job id to delete
        required: true

permissions:
  contents: write

# Keep one writer at a time so purge jobs do not fight download jobs during git push.
concurrency:
  group: download-${{ github.repository }}
  cancel-in-progress: false

jobs:
  purge:
    runs-on: ubuntu-latest
    env:
      JOB_ID: ${{ inputs.job_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$JOB_ID" =~ ^[A-Za-z0-9_-]{6,64}$ ]]; then
            echo "Invalid job_id: $JOB_ID" >&2
            exit 1
          fi

      - name: Purge job folder from Git history
        shell: bash
        run: |
          set -euo pipefail

          python3 -m pip install --user git-filter-repo
          export PATH="$HOME/.local/bin:$PATH"

          BRANCH="${GITHUB_REF_NAME:-main}"
          ORIGIN_URL="$(git remote get-url origin)"

          # git-filter-repo rewrites history and may remove origin as a safety
          # measure, so keep the authenticated remote URL and restore it.
          git filter-repo --force --path "jobs/$JOB_ID" --invert-paths

          if ! git remote get-url origin >/dev/null 2>&1; then
            git remote add origin "$ORIGIN_URL"
          fi

          git push origin "HEAD:$BRANCH" --force
